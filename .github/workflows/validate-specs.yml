name: Validate Trace Wing Specs

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Debug file tree
        run: |
          echo "=== Repository file tree ==="
          find . -maxdepth 4 -type f | sort

      - name: Validate Trace Wing specification and example
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          import yaml
          from jsonschema import Draft202012Validator

          print("=== Validating Trace Wing repository ===")

          spec_path = Path("spec/trace-wing-agent-v0.1.yaml")
          spec_schema_path = Path("schemas/trace-wing-agent-v0.1.schema.json")
          claim_schema_path = Path("schemas/trace-claim-v0.1.schema.json")
          sample_path = Path("examples/trace-claim.sample.yaml")

          failed = False

          def require_file(path: Path, label: str):
              global failed
              if not path.exists():
                  print(f"ERROR: {label} file not found: {path}")
                  failed = True
                  return False
              return True

          def load_yaml(path: Path, label: str):
              global failed
              try:
                  with path.open("r", encoding="utf-8") as f:
                      data = yaml.safe_load(f)
                  print(f"OK: {label} YAML parsed successfully: {path}")
                  return data
              except yaml.YAMLError as e:
                  print(f"ERROR: Invalid YAML in {label} file {path}: {e}")
                  failed = True
                  return None
              except Exception as e:
                  print(f"ERROR: Failed to read {label} file {path}: {e}")
                  failed = True
                  return None

          def load_json(path: Path, label: str):
              global failed
              try:
                  with path.open("r", encoding="utf-8") as f:
                      data = json.load(f)
                  print(f"OK: {label} JSON parsed successfully: {path}")
                  return data
              except json.JSONDecodeError as e:
                  print(f"ERROR: Invalid JSON in {label} file {path}: {e}")
                  failed = True
                  return None
              except Exception as e:
                  print(f"ERROR: Failed to read {label} file {path}: {e}")
                  failed = True
                  return None

          def validate_schema(schema_data, schema_path: Path, label: str):
              global failed
              try:
                  Draft202012Validator.check_schema(schema_data)
                  print(f"OK: {label} schema is valid: {schema_path}")
              except Exception as e:
                  print(f"ERROR: Invalid JSON Schema in {label} file {schema_path}: {e}")
                  failed = True

          def validate_instance(instance, schema_data, instance_path: Path, label: str):
              global failed
              try:
                  Draft202012Validator(schema_data).validate(instance)
                  print(f"OK: {label} is valid against schema: {instance_path}")
              except Exception as e:
                  print(f"ERROR: {label} validation failed for {instance_path}: {e}")
                  failed = True

          print("\n=== Checking required files ===")
          spec_ok = require_file(spec_path, "Spec")
          spec_schema_ok = require_file(spec_schema_path, "Spec schema")
          claim_schema_ok = require_file(claim_schema_path, "Trace claim schema")
          sample_ok = require_file(sample_path, "Sample")

          if spec_ok:
              print(f"OK: Found spec file: {spec_path}")
          if spec_schema_ok:
              print(f"OK: Found spec schema file: {spec_schema_path}")
          if claim_schema_ok:
              print(f"OK: Found trace claim schema file: {claim_schema_path}")
          if sample_ok:
              print(f"OK: Found sample file: {sample_path}")

          print("\n=== Loading files ===")
          spec_data = load_yaml(spec_path, "Spec") if spec_ok else None
          sample_data = load_yaml(sample_path, "Sample") if sample_ok else None
          spec_schema_data = load_json(spec_schema_path, "Spec schema") if spec_schema_ok else None
          claim_schema_data = load_json(claim_schema_path, "Trace claim schema") if claim_schema_ok else None

          print("\n=== Validating schemas ===")
          if spec_schema_data is not None:
              validate_schema(spec_schema_data, spec_schema_path, "Spec")
          if claim_schema_data is not None:
              validate_schema(claim_schema_data, claim_schema_path, "Trace claim")

          print("\n=== Validating instances against schemas ===")
          if spec_data is not None and spec_schema_data is not None:
              if not isinstance(spec_data, dict):
                  print(f"ERROR: Spec root must be a mapping/object: {spec_path}")
                  failed = True
              else:
                  validate_instance(spec_data, spec_schema_data, spec_path, "Spec")

          if sample_data is not None and claim_schema_data is not None:
              if not isinstance(sample_data, dict):
                  print(f"ERROR: Sample root must be a mapping/object: {sample_path}")
                  failed = True
              else:
                  validate_instance(sample_data, claim_schema_data, sample_path, "Sample")

          print("\n=== Summary ===")
          print(f"Spec:              {spec_path}")
          print(f"Spec schema:       {spec_schema_path}")
          print(f"Trace claim schema:{claim_schema_path}")
          print(f"Sample:            {sample_path}")

          if failed:
              print("\nValidation failed.")
              raise SystemExit(1)

          print("\nAll validations passed.")
          PY
